name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build-training:
    name: Build Training Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build training image
        run: docker build -t sentiment-training ./training

  build-api:
    name: Build API Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        run: docker build -t sentiment-api ./api

      - name: Test API image builds correctly
        run: |
          docker run --rm -d --name test-api -p 8000:8000 sentiment-api
          sleep 5
          docker stop test-api || true

  build-monitoring:
    name: Build Monitoring Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build monitoring image
        run: docker build -t sentiment-monitoring ./monitoring