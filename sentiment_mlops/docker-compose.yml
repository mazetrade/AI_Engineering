services:

  mlflow:
    image: python:3.11-slim
    container_name: mlflow-server
    working_dir: /mlflow
    command: >-
      bash -c "pip install mlflow==2.11.0 setuptools && mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    networks:
      - sentiment-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  trainer:
    build:
      context: ./training
      dockerfile: Dockerfile
    container_name: training-container
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - ./data:/app/data
      - training-results:/app/results
    networks:
      - sentiment-net

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: api-container
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - api-data:/app
    networks:
      - sentiment-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  monitoring:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: monitoring-container
    depends_on:
      api:
        condition: service_healthy
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - api-data:/app
      - monitoring-reports:/app/reports
    networks:
      - sentiment-net
    restart: unless-stopped

networks:
  sentiment-net:
    driver: bridge

volumes:
  mlflow-data:
  training-results:
  api-data:
  monitoring-reports: